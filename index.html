<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="stylesheets/index.css">
</head>

<body>
    <main>
        <div class="container-sm text-center">
            <div class="row">
                <div class="col-12">
                    <h1 class="audiowide-regular">Simon says...</h1>
                </div>
            </div>
            <div class="row choose-difficulty">
                <h5>Choose Difficulty</h5>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault1">
                    <label class="form-check-label" for="radioDefault1">
                        Easy (3 numbers)
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault2" checked>
                    <label class="form-check-label" for="radioDefault2">
                        Medium (5 numbers)
                    </label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="radio" name="radioDefault" id="radioDefault3">
                    <label class="form-check-label" for="radioDefault3">
                        Hard (7 numbers)
                    </label>
                </div>
            </div>
            <div class="row memo-group">
                <div class="memo-div medium">
                    <input type="text" class="memo-input" readonly>
                </div>
                <div class="memo-div medium">
                    <input type="text" class="memo-input" readonly>
                </div>
                <div class="memo-div medium">
                    <input type="text" class="memo-input" readonly>
                </div>
                <div class="memo-div medium">
                    <input type="text" class="memo-input" readonly>
                </div>
                <div class="memo-div medium">
                    <input type="text" class="memo-input" readonly>
                </div>
            </div>
            <div class="row generate-row">
                <button class="generate-numb btn">
                    Generate new
                </button>
            </div>
            <div class="row timer-row">
                <h2 class="timer audiowide-regular"></h2>
            </div>
            <div class="row">
                <button class="push-numb btn d-none">
                    Push answer
                </button>
            </div>
            <div class="row alert-row d-none">
                <h4 class="alertText audiowide-regular">Puoi inserire solo valori numerici da 1 a 99, <br> non sono
                    ammessi valori ripetuti</h4>
            </div>
            <div class="row score-card flex-column gap-3 text-start text-nowrap d-none">
                <div class="col-4 score audiowide-regular">
                    <h5>Score: 3</h5>
                </div>
                <div class="col-4 right audiowide-regular">
                    <h5>Right numbers: 34, 55, 3</h5>
                </div>
                <div class="col-4 wrong audiowide-regular">
                    <h5>Wrong numbers: 22, 77</h5>
                </div>
            </div>
        </div>
    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="scripts/index.js"></script>
</body>

</html>
